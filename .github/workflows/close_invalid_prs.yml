name: Close invalid PRs

on:
  pull_request_target:
    types:
      - opened

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: superbrothers/close-pull-request@v3
        id: same_branch
        if: github.event.pull_request.head.ref == github.event.pull_request.base.ref
        with:
          comment: "Please do not open pull requests from branches of the same name (e.g. '1.21.4'), create a new branch instead"

      - uses: superbrothers/close-pull-request@v3
        id: org_account
        if: github.event.pull_request.head.repo.owner.type != 'User' && steps.same_branch.outcome == 'skipped'
        with:
          comment: "Please do not open pull requests from non-user accounts like organizations. Create a fork on a user account instead."
